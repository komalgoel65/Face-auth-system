<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Submit Meter Reading</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0f0f1a;
        color: white;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 30px;
        min-height: 100vh;
      }
      .card {
        background: #1a1a2e;
        padding: 35px;
        border-radius: 15px;
        width: 550px;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 25px;
      }
      .header .icon {
        font-size: 2.5rem;
      }
      h2 {
        color: #00e5ff;
        font-size: 1.5rem;
      }
      .mr-badge {
        background: #0f0f1a;
        padding: 8px 15px;
        border-radius: 8px;
        font-size: 0.85rem;
        color: #aaa;
        margin-bottom: 25px;
      }
      .mr-badge span {
        color: #00e5ff;
        font-weight: bold;
      }
      label {
        display: block;
        color: #aaa;
        font-size: 0.85rem;
        margin-bottom: 6px;
        margin-top: 15px;
      }
      input,
      select {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #333;
        background: #0f0f1a;
        color: white;
        font-size: 1rem;
      }
      input:focus {
        outline: none;
        border-color: #00e5ff;
      }
      .row {
        display: flex;
        gap: 15px;
      }
      .row > div {
        flex: 1;
      }
      .units-display {
        background: #0f0f1a;
        border: 1px solid #00e5ff;
        border-radius: 8px;
        padding: 15px;
        text-align: center;
        margin-top: 15px;
      }
      .units-display label {
        color: #aaa;
        font-size: 0.8rem;
        margin: 0 0 5px 0;
      }
      .units-display .value {
        font-size: 2rem;
        font-weight: bold;
        color: #00ff88;
      }
      .photo-section {
        margin-top: 15px;
      }
      .photo-preview {
        width: 100%;
        height: 200px;
        border: 2px dashed #333;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #555;
        margin-top: 8px;
        overflow: hidden;
        cursor: pointer;
      }
      .photo-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      input[type="file"] {
        display: none;
      }
      .btn-submit {
        width: 100%;
        padding: 15px;
        background: #00e5ff;
        color: #0f0f1a;
        border: none;
        border-radius: 8px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        margin-top: 25px;
      }
      .btn-submit:hover {
        opacity: 0.85;
      }
      .error {
        background: #ff444420;
        border: 1px solid #ff4444;
        color: #ff4444;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 15px;
        font-size: 0.9rem;
      }
      .required {
        color: #ff4444;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="header">
        <div class="icon">📋</div>
        <div>
          <h2>Meter Reading Submission</h2>
          <div style="color: #aaa; font-size: 0.85rem">
            Fill in the details below
          </div>
        </div>
      </div>

      <div class="mr-badge">
        MR: <span>{{ name }}</span> &nbsp;|&nbsp; 📅
        <span>{{ now if now else '' }}</span>
      </div>

      {% if error %}
      <div class="error">❌ Error: {{ error }}</div>
      {% endif %}

      <form method="POST" enctype="multipart/form-data">
        <label>Consumer ID <span class="required">*</span></label>
        <input
          type="text"
          name="consumer_id"
          placeholder="e.g. CON-2024-001"
          required
        />

        <label>Consumer Name <span class="required">*</span></label>
        <input
          type="text"
          name="consumer_name"
          placeholder="e.g. Rajesh Kumar"
        />

        <div class="row">
          <div>
            <label
              >Previous Reading (units) <span class="required">*</span></label
            >
            <input
              type="number"
              name="previous_reading"
              id="prev"
              placeholder="e.g. 1250"
              step="0.01"
              required
              oninput="calcUnits()"
            />
          </div>
          <div>
            <label
              >Current Reading (units) <span class="required">*</span></label
            >
            <input
              type="number"
              name="current_reading"
              id="curr"
              placeholder="e.g. 1380"
              step="0.01"
              required
              oninput="calcUnits()"
            />
          </div>
        </div>

        <div class="units-display">
          <label>Units Consumed</label>
          <div class="value" id="units">0.00</div>
        </div>

        <div class="photo-section">
          <label>Photo of Meter <span class="required">*</span></label>
          <div
            class="photo-preview"
            id="preview"
            onclick="document.getElementById('meter_photo').click()"
          >
            <span id="preview-text"
              >📷 Click to capture / upload meter photo</span
            >
          </div>
          <input
            type="file"
            name="meter_photo"
            id="meter_photo"
            accept="image/*"
            capture="environment"
            onchange="showPreview(this)"
          />
        </div>

        <input type="hidden" name="location" id="location_field" value="N/A" />

        <button type="submit" class="btn-submit">✅ Submit Reading</button>
      </form>
    </div>

    <script>
      function calcUnits() {
        const prev = parseFloat(document.getElementById("prev").value) || 0;
        const curr = parseFloat(document.getElementById("curr").value) || 0;
        const units = curr - prev;
        document.getElementById("units").textContent =
          units >= 0 ? units.toFixed(2) : "⚠️ Invalid";
        document.getElementById("units").style.color =
          units >= 0 ? "#00ff88" : "#ff4444";
      }

      function showPreview(input) {
        if (input.files && input.files[0]) {
          const reader = new FileReader();
          reader.onload = (e) => {
            document.getElementById("preview").innerHTML =
              `<img src="${e.target.result}">`;
          };
          reader.readAsDataURL(input.files[0]);
        }
      }

      // Get location
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
          document.getElementById("location_field").value =
            `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
        });
      }
    </script>
  </body>
</html>
