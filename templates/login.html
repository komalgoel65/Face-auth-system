<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Login</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0f0f1a;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .card {
        background: #1a1a2e;
        padding: 40px;
        border-radius: 15px;
        width: 380px;
        text-align: center;
      }
      .icon {
        font-size: 3rem;
        margin-bottom: 15px;
      }
      h2 {
        color: #00e5ff;
        margin-bottom: 8px;
      }
      p.sub {
        color: #aaa;
        font-size: 0.9rem;
        margin-bottom: 30px;
      }
      label {
        display: block;
        text-align: left;
        color: #aaa;
        font-size: 0.85rem;
        margin-bottom: 5px;
      }
      input {
        width: 100%;
        padding: 12px;
        margin-bottom: 20px;
        border-radius: 8px;
        border: 1px solid #333;
        background: #0f0f1a;
        color: white;
        font-size: 1rem;
      }
      input:focus {
        outline: none;
        border-color: #00e5ff;
      }
      button {
        width: 100%;
        padding: 14px;
        background: #00e5ff;
        color: #0f0f1a;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
      }
      button:hover {
        opacity: 0.85;
      }
      .error {
        background: #ff444420;
        border: 1px solid #ff4444;
        color: #ff4444;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 0.9rem;
      }
      a {
        color: #aaa;
        display: block;
        margin-top: 20px;
        text-decoration: none;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">🔐</div>
      <h2>Admin Login</h2>
      <p class="sub">Sign in to access the dashboard</p>

      {% if error %}
      <div class="error">❌ {{ error }}</div>
      {% endif %}

      <form method="POST">
        <input type="hidden" name="next" value="{{ next_page }}" />
        <label>Username</label>
        <input
          type="text"
          name="username"
          placeholder="Enter username"
          required
          autofocus
        />
        <label>Password</label>
        <input
          type="password"
          name="password"
          placeholder="Enter password"
          required
        />
        <button type="submit">Login →</button>
      </form>
      <a href="/">← Back to Home</a>
    </div>
  </body>
</html>
