<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Reading Submitted!</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0f0f1a;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .card {
        text-align: center;
      }
      .tick {
        font-size: 5rem;
        margin-bottom: 20px;
      }
      h1 {
        color: #00ff88;
        font-size: 2rem;
        margin-bottom: 10px;
      }
      p {
        color: #aaa;
        margin-bottom: 30px;
      }
      .name {
        color: #00e5ff;
        font-weight: bold;
      }
      .btn {
        padding: 12px 30px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: bold;
        margin: 5px;
        display: inline-block;
      }
      .btn-primary {
        background: #00e5ff;
        color: #0f0f1a;
      }
      .btn-secondary {
        border: 2px solid #aaa;
        color: #aaa;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="tick">📊</div>
      <h1>Reading Submitted!</h1>
      <p>
        Thank you, <span class="name">{{ name }}</span>.<br />Your meter reading
        has been recorded successfully.
      </p>
      <a href="/authenticate" class="btn btn-primary">Submit Another</a>
      <a href="/" class="btn btn-secondary">Home</a>
    </div>
  </body>
</html>
